# Frozen run configuration. Every value here is logged into each run's manifest.
# Changing a sampling parameter is a methodology change (Rule 0): it lands in
# CHANGELOG-METHOD.md and triggers a re-score. Do not tune these to chase a result.

endpoint: "https://proxy-monetize.fluxapay.xyz/llm/unify-llm/v1/chat/completions"

# IMPORTANT: this is a PROXY endpoint (Unify via FluxA), not direct vendor APIs.
# We measure models as served through this proxy. Routing, caching, or
# quantization introduced by the proxy is invisible to us and is attributed to
# nothing — see METHODOLOGY.md § "The proxy caveat". Every result is stamped
# "as served through Unify on <date>".
served_via: "unify-llm via fluxapay proxy-monetize"

# We REQUEST floating aliases (what a user types) and RECORD the dated snapshot
# the proxy returns. Alias -> snapshot changes are a first-class finding.
models:
  - alias: "anthropic/claude-opus-4.6"
    vendor: anthropic
  - alias: "anthropic/claude-sonnet-4.6"
    vendor: anthropic
  - alias: "openai/gpt-5.5"
    vendor: openai
  - alias: "openai/gpt-5.4"
    vendor: openai
  - alias: "google/gemini-3.1-pro-preview"
    vendor: google
  - alias: "google/gemini-3.5-flash"
    vendor: google
  # Open-weight tier. Far cheaper per output token (20k–300k units/1M vs
  # 1.5M–3M for the frontier tier), so this is where a statistically-powered
  # run with real confidence intervals is actually affordable — the rigorous
  # core of the drift benchmark. All are reasoning models; max_tokens is raised
  # to 2048 so their `content` is not starved (CHANGELOG 2026-07-16b).
  - alias: "deepseek-v4-flash"
    vendor: deepseek
  - alias: "deepseek-v3.2"
    vendor: deepseek
  - alias: "deepseek-v3.2-think"
    vendor: deepseek
  - alias: "minimax-m2.5"
    vendor: minimax
  - alias: "kimi-k2.5"
    vendor: moonshot
  - alias: "glm-5"
    vendor: zhipu
  - alias: "deepseek-v4-pro"
    vendor: deepseek
  - alias: "kimi-k2.6"
    vendor: moonshot
  - alias: "glm-5.2"
    vendor: zhipu
  - alias: "glm-5.1"
    vendor: zhipu
  - alias: "ernie-5.0-thinking-preview"
    vendor: baidu

# Pinned sampling. temperature 0 does NOT make the API deterministic; k samples
# capture the residual nondeterminism, which is exactly the noise floor Rule 7
# needs to separate signal from.
sampling:
  temperature: 0
  top_p: 1
  max_tokens: 4096   # headroom so reasoning models don't starve `content` to empty
                     # (see CHANGELOG-METHOD 2026-07-16b); 1024 left some open-weight
                     # reasoning models emitting reasoning_content but no answer
  k_samples: 5
  timeout_s: 60
  request_seed: 20260715  # sent when the vendor honours it; logged either way

tasks:
  - tasks/primality.jsonl

# Weekly, not daily. Drift happens on the scale of months; daily cadence buys no
# resolution and burns 7x the balance. 7 models x 30 tasks x 3 paraphrases x 5
# samples = 3150 calls per run.
cadence: weekly
